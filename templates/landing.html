<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Chatroom - Enter the Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      background: linear-gradient(-45deg, #0f0f23, #1a0033, #2d1b69, #6366f1);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      right: -50%;
      bottom: -50%;
      background:
        radial-gradient(ellipse 100% 60% at 20% 40%, rgba(99, 102, 241, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse 80% 50% at 80% 80%, rgba(236, 72, 153, 0.4) 0%, transparent 40%),
        radial-gradient(ellipse 50% 30% at 40% 20%, rgba(120, 219, 255, 0.3) 0%, transparent 50%);
      animation: nebula 20s linear infinite;
      z-index: 1;
    }

    @keyframes nebula {

      0%,
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 0.8;
      }

      33% {
        transform: scale(1.1) rotate(120deg);
        opacity: 0.6;
      }

      66% {
        transform: scale(0.95) rotate(240deg);
        opacity: 0.9;
      }
    }

    .content {
      text-align: center;
      z-index: 3;
      position: relative;
      animation: bounceIn 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0.3) translateY(100px);
        opacity: 0;
      }

      50% {
        transform: scale(1.15);
      }

      70% {
        transform: scale(0.95) translateY(-10px);
      }

      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      background: linear-gradient(135deg, #fff, #ec4899, #6366f1, #f472b6);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      text-shadow: 0 0 60px rgba(99, 102, 241, 0.8);
      animation: textGlow 3s ease-in-out infinite alternate;
      letter-spacing: 3px;
    }

    @keyframes textGlow {
      from {
        filter: drop-shadow(0 0 20px #6366f1);
      }

      to {
        filter: drop-shadow(0 0 40px #ec4899);
      }
    }

    p {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      margin-bottom: 3rem;
      opacity: 0.95;
      max-width: 600px;
      line-height: 1.6;
      animation: fadeInUp 1s ease 0.3s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
      color: white;
      text-decoration: none;
      padding: 1.2rem 3rem;
      border-radius: 50px;
      font-size: 1.3rem;
      font-weight: 700;
      box-shadow:
        0 20px 40px rgba(99, 102, 241, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      animation: pulseBtn 2s infinite;
    }

    @keyframes pulseBtn {
      0% {
        box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
      }

      50% {
        box-shadow: 0 25px 50px rgba(99, 102, 241, 0.6);
      }

      100% {
        box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
      }
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: 0.6s;
    }

    .cta-button:hover::before {
      left: 100%;
    }

    .cta-button:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 30px 60px rgba(99, 102, 241, 0.7);
    }

    .cta-button:active {
      transform: translateY(-5px);
    }

    .floating-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .icon {
      position: absolute;
      font-size: 2rem;
      animation: float 6s infinite linear;
      opacity: 0.6;
    }

    .icon:nth-child(1) {
      top: 20%;
      left: 10%;
      animation-delay: 0s;
    }

    .icon:nth-child(2) {
      top: 60%;
      right: 15%;
      animation-delay: 2s;
    }

    .icon:nth-child(3) {
      bottom: 30%;
      left: 20%;
      animation-delay: 4s;
    }

    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-30px) rotate(180deg);
      }

      100% {
        transform: translateY(0) rotate(360deg);
      }
    }

    @media (max-width: 768px) {
      .cta-button {
        padding: 1rem 2rem;
        font-size: 1.1rem;
      }

      h1 {
        letter-spacing: 1px;
      }
    }
  </style>
</head>

<body>
  <div class="floating-icons">
    <div class="icon">✨</div>
    <div class="icon">🚀</div>
    <div class="icon">🌟</div>
  </div>

  <div class="content">
    <h1>Neon Chatroom</h1>
    <p>Join the future of conversations. Secure, fast, and immersive chat experience awaits you.</p>
    <a href="/auth/auth-page/" class="cta-button">🚀 Start Chatting Now</a>
  </div>
</body>

</html>
