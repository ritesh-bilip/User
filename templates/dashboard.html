<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Neon Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a0033 50%, #2d1b69 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
    }
    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 2.5rem;
      width: 100%;
      max-width: 600px;
    }
    h1 { color: #fff; text-align: center; font-size: 2rem; margin-bottom: 0.3rem; text-shadow: 0 0 20px rgba(99,102,241,0.8); }
    #welcomeMsg { text-align: center; color: rgba(255,255,255,0.6); margin-bottom: 2rem; }
    #welcomeMsg span { color: #ec4899; font-weight: 600; }
    .profile-card {
      background: linear-gradient(145deg, rgba(99,102,241,0.15), rgba(236,72,153,0.15));
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      box-shadow: 0 20px 40px rgba(99,102,241,0.3);
    }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #00f0ff, #ff00ff, #00ff88);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 1rem;
      box-shadow: 0 10px 30px rgba(0,240,255,0.6); color: white;
    }
    .profile-card p { color: rgba(255,255,255,0.75); margin: 0.3rem 0; font-size: 0.95rem; }
    .profile-card p strong { color: #fff; }
    .room-section {
      background: rgba(255,255,255,0.07);
      border-radius: 20px; padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .room-section h3 { color: #fff; margin-bottom: 1rem; font-size: 1.1rem; }
    .room-input-group { display: flex; gap: 0.8rem; margin-bottom: 1rem; }
    .room-input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 0.8rem 1.2rem;
      color: white; font-size: 0.95rem; outline: none;
    }
    .room-item {
      background: rgba(0,240,255,0.1);
      border-radius: 12px; padding: 0.9rem 1rem;
      margin: 0.4rem 0; cursor: pointer;
      transition: all 0.4s ease;
      border: 1px solid rgba(0,240,255,0.3);
      display: flex; justify-content: space-between;
      align-items: center; color: #fff;
    }
    .room-item:hover {
      background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(0,240,255,0.3));
      border-color: #00f0ff;
    }
    .rooms-history-box {
      margin-top: 1rem; padding-top: 1rem;
      border-top: 1px dashed rgba(255,255,255,0.15);
    }
    .history-title { font-size: 0.9rem; color: rgba(255,255,255,0.6); margin-bottom: 0.5rem; }
    .history-tag {
      display: inline-block;
      background: rgba(139,92,246,0.25);
      border: 1px solid rgba(139,92,246,0.4);
      color: #c084fc;
      padding: 0.25rem 0.6rem;
      border-radius: 8px;
      font-size: 0.8rem;
      margin-right: 0.4rem;
      margin-bottom: 0.4rem;
    }
    .btn {
      border: none; border-radius: 12px;
      padding: 0.75rem 1.5rem;
      color: white; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.3s ease;
      width: 100%; margin-bottom: 0.6rem;
    }
    .btn-green { background: linear-gradient(135deg, #10b981, #34d399, #00ff88); }
    .btn-red { background: linear-gradient(135deg, #ef4444, #f87171, #ff6b6b); }
    #toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: linear-gradient(135deg, rgba(20,10,40,0.98), rgba(45,27,105,0.9));
      border: 1px solid rgba(0,240,255,0.4);
      color: #fff; padding: 0.8rem 1.6rem;
      border-radius: 14px; font-size: 0.9rem;
      z-index: 999; transition: all 0.5s ease;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body>
  <div class="container">
    <h1>✨ Dashboard</h1>
    <p id="welcomeMsg">Welcome back, <span id="usernameDisplay">...</span></p>

    <div class="profile-card" id="profileCard">
      <div class="avatar">👤</div>
      <p id="bioText"><strong>Bio:</strong> Loading Profile...</p>
      <p id="joinedText"><strong>Joined:</strong> ...</p>
      <p id="emailText" style="color:rgba(255,255,255,0.45);font-size:0.8rem;"></p>
      <div class="rooms-history-box">
        <div class="history-title">🛠️ Your Created / Joined Chatrooms:</div>
        <div id="historyTagsContainer">
          <span style="font-size:0.8rem;color:rgba(255,255,255,0.35);">No rooms logged yet</span>
        </div>
      </div>
    </div>

    <div class="room-section">
      <h3>🎮 Join or Create a Room</h3>
      <div class="room-input-group">
        <input type="text" id="roomInput" class="room-input" placeholder="Room name (e.g. coding, chill)" maxlength="50">
        <button class="btn btn-green" style="width:auto;margin:0;padding:0.75rem 1.2rem;" onclick="joinCustomRoom()">🚀 Join</button>
      </div>
      <div class="room-item" onclick="joinRoom('general')"><span>🌐 General</span><span style="font-size:0.8rem;color:rgba(255,255,255,0.5);">Join →</span></div>
      <div class="room-item" onclick="joinRoom('gaming')"><span>🎮 Gaming</span><span style="font-size:0.8rem;color:rgba(255,255,255,0.5);">Join →</span></div>
      <div class="room-item" onclick="joinRoom('coding')"><span>💻 Coding</span><span style="font-size:0.8rem;color:rgba(255,255,255,0.5);">Join →</span></div>
      <div class="room-item" onclick="joinRoom('music')"><span>🎵 Music Lounge</span><span style="font-size:0.8rem;color:rgba(255,255,255,0.5);">Join →</span></div>
    </div>

    <button class="btn btn-red" onclick="logout()">🚪 Logout</button>
  </div>

  <div id="toast"></div>

  <script>
    let toastTimer;

    function showToast(msg, duration = 3500) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), duration);
    }

    function captureTokenFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const urlToken = urlParams.get('token');
      if (urlToken) {
        localStorage.setItem("access", urlToken);
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }

    async function getValidToken() {
      captureTokenFromUrl();
      let token = localStorage.getItem("access");
      if (!token) {
        window.location.href = "/auth/auth-page/";
        return null;
      }
      return token;
    }

    function recordRoomInHistory(roomName) {
      let rooms = JSON.parse(localStorage.getItem("user_tracked_rooms") || "[]");
      if (!rooms.includes(roomName)) {
        rooms.push(roomName);
        localStorage.setItem("user_tracked_rooms", JSON.stringify(rooms));
      }
    }

    function displayRoomHistory() {
      const container = document.getElementById("historyTagsContainer");
      let rooms = JSON.parse(localStorage.getItem("user_tracked_rooms") || "[]");
      if (rooms.length === 0) {
        container.innerHTML = `<span style="font-size:0.8rem;color:rgba(255,255,255,0.35);">No rooms logged yet</span>`;
        return;
      }
      container.innerHTML = rooms.map(room => `<span class="history-tag"># ${room}</span>`).join('');
    }

    async function loadProfile() {
      const token = await getValidToken();
      if (!token) return;

      displayRoomHistory();

      try {
        const response = await fetch("/auth/profile/", {
          headers: { "Authorization": "Bearer " + token }
        });

        if (response.ok) {
          const profile = await response.json();
          const fallBackName = localStorage.getItem("client_name") || "Portal User";
          const fallBackEmail = localStorage.getItem("client_email") || "";

          document.getElementById("usernameDisplay").textContent = fallBackName;
          document.getElementById("emailText").textContent = fallBackEmail;
          document.getElementById("bioText").innerHTML = `<strong>🌟 Bio:</strong> ${profile.bio || "Dreamer & Creator"}`;
          document.getElementById("joinedText").innerHTML = `<strong>📅 Joined:</strong> ${profile.created_at ? new Date(profile.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : 'Recently'}`;

          if (profile.avatar) {
            document.querySelector(".avatar").innerHTML = `<img src="${profile.avatar}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">`;
          } else {
            document.querySelector(".avatar").textContent = fallBackName.slice(0, 2).toUpperCase();
          }
        } else {
          throw new Error("Validation failure");
        }
      } catch (e) {
        localStorage.clear();
        showToast("Authentication state invalid. Redirecting...");
        setTimeout(() => { window.location.href = "/auth/auth-page/"; }, 1500);
      }
    }

    async function joinRoom(name) {
      const token = await getValidToken();
      if (!token) return;

      recordRoomInHistory(name);

      // ─────────────────────────────────────────────────
      // FIX: was hardcoded to http://127.0.0.1:8001
      // Now detects local vs production automatically.
      // In production this becomes:
      //   https://chat-service-app-9xqu.onrender.com
      // ─────────────────────────────────────────────────
      const isLocalhost = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
      const chatUrl = isLocalhost
        ? "http://127.0.0.1:8001"
        : "https://chat-service-app-9xqu.onrender.com";

      window.location.href = `${chatUrl}/${name}/?token=${token}`;
    }

    async function joinCustomRoom() {
      const name = document.getElementById("roomInput").value.trim().toLowerCase();
      if (!name) { showToast("⚠️ Enter a room name first"); return; }
      await joinRoom(name);
    }

    document.getElementById("roomInput").addEventListener("keypress", e => {
      if (e.key === "Enter") joinCustomRoom();
    });

    function logout() {
      localStorage.clear();
      showToast("👋 Logged out safely!");
      setTimeout(() => { window.location.href = "/auth/auth-page/"; }, 1000);
    }

    window.addEventListener("load", loadProfile);
  </script>
</body>

</html>
