<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth - Neon Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a0033 50%, #2d1b69 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
      animation: floatBg 20s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes floatBg {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(180deg);
      }
    }

    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: rgba(99, 102, 241, 0.5);
      border-radius: 50%;
      animation: floatParticle 6s infinite linear;
    }

    @keyframes floatParticle {

      0%,
      100% {
        transform: translateY(0);
        opacity: 0.5;
      }

      50% {
        transform: translateY(-30px);
        opacity: 1;
      }
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      position: relative;
      z-index: 1;
      animation: slideIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.9);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h2 {
      color: #fff;
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 2rem;
      text-shadow: 0 0 20px rgba(99, 102, 241, 0.8);
      letter-spacing: 2px;
    }

    .tab-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
    }

    .tab-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 0.65rem 1rem;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
    }

    .tab-btn:hover:not(.active) {
      border-color: rgba(255, 255, 255, 0.3);
      color: rgba(255, 255, 255, 0.8);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    input {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 15px;
      padding: 1rem 1.5rem;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
      width: 100%;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.45);
    }

    input:focus {
      border-color: #ec4899;
      box-shadow: 0 0 25px rgba(236, 72, 153, 0.35);
      background: rgba(255, 255, 255, 0.12);
    }

    button[type="submit"] {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
      border: none;
      border-radius: 15px;
      padding: 1rem 2rem;
      color: white;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
      position: relative;
      overflow: hidden;
      width: 100%;
      margin-top: 0.3rem;
    }

    button[type="submit"]::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
      transition: left 0.5s;
    }

    button[type="submit"]:hover::before {
      left: 100%;
    }

    button[type="submit"]:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(99, 102, 241, 0.55);
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(30, 20, 60, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 0.9rem 1.8rem;
      border-radius: 14px;
      font-size: 0.95rem;
      z-index: 999;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      max-width: 340px;
      text-align: center;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #toast.success {
      border-color: rgba(99, 102, 241, 0.5);
    }

    #toast.error {
      border-color: rgba(236, 72, 153, 0.5);
    }

    @media (max-width: 480px) {
      .container {
        margin: 1rem;
        padding: 2rem 1.2rem;
      }

      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="particles" id="particles"></div>

  <div class="container">
    <h2>🌌 Neon Portal</h2>

    <div id="authSection">
      <div class="tab-row">
        <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">🔑 Login</button>
        <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">✨ Sign Up</button>
      </div>

      <form id="authForm" class="form-group">
        <input type="text" id="nameInput" placeholder="👤 Full Name" style="display:none;" autocomplete="name">
        <!-- New Phone Number Input Field -->
        <input type="tel" id="phoneInput" placeholder="📞 Phone Number" style="display:none;" autocomplete="tel">
        <input type="email" id="emailInput" placeholder="✉️ Email" required autocomplete="email">
        <input type="password" id="passwordInput" placeholder="🔒 Password" required autocomplete="current-password">
        <button type="submit" id="authSubmitBtn">🚀 Login</button>
      </form>
    </div>

    <div id="toast"></div>

    <script>
      let currentMode = "login";
      let toastTimer;

      function checkExistingAuth() {
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        if (urlToken) {
          localStorage.setItem("access", urlToken);
        }
        if (localStorage.getItem("access")) {
          window.location.href = "/auth/dashboard/";
        }
      }
      window.addEventListener("DOMContentLoaded", checkExistingAuth);

      function switchTab(mode) {
        currentMode = mode;
        const isSignup = mode === "signup";

        // Handle name visibility
        document.getElementById("nameInput").style.display = isSignup ? "block" : "none";
        document.getElementById("nameInput").required = isSignup;

        // Handle phone input visibility
        document.getElementById("phoneInput").style.display = isSignup ? "block" : "none";
        document.getElementById("phoneInput").required = isSignup;

        document.getElementById("authSubmitBtn").textContent = isSignup ? "✨ Sign Up" : "🚀 Login";
        document.getElementById("loginTab").classList.toggle("active", !isSignup);
        document.getElementById("signupTab").classList.toggle("active", isSignup);
        document.getElementById("passwordInput").autocomplete = isSignup ? "new-password" : "current-password";
      }

      function getCookie(name) {
        const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
        return match ? decodeURIComponent(match[1]) : null;
      }

      function showToast(msg, type = "success") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = `show ${type}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { t.className = ""; }, 3500);
      }

      document.getElementById("authForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const name = document.getElementById("nameInput").value.trim();
        const phone = document.getElementById("phoneInput").value.trim();
        const email = document.getElementById("emailInput").value.trim();
        const password = document.getElementById("passwordInput").value;

        if (!email || !password) { showToast("Please fill in all standard fields", "error"); return; }
        if (currentMode === "signup") {
          if (!name) { showToast("Name is required for creation step", "error"); return; }
          if (!phone) { showToast("Phone number is required", "error"); return; }
        }

        const btn = document.getElementById("authSubmitBtn");
        btn.disabled = true;
        btn.textContent = "⏳ Please wait...";

        const endpoint = currentMode === "signup" ? "/auth/auth-page-register/" : "/auth/auth-page-login/";

        // Dynamic Payload to include phone_number during sign up
        const payload = currentMode === "signup"
          ? { name, email, password, phone_number: phone }
          : { email, password };

        try {
          const response = await fetch(endpoint, {
            method: "POST",
            body: JSON.stringify(payload),
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": getCookie("csrftoken")
            }
          });

          const data = await response.json();
          if (response.ok) {
            showToast(currentMode === "signup" ? "Signup successful 🎉" : "Login successful 🚀", "success");

            localStorage.setItem("access", data.access);
            localStorage.setItem("refresh", data.refresh);
            localStorage.setItem("client_name", data.name || "");
            localStorage.setItem("client_email", data.email || "");

            setTimeout(() => { window.location.href = "/auth/dashboard/"; }, 1000);
          } else {
            // Display clean validation message back out to user
            let errorMsg = data.error || data.detail || "Authentication validation failure.";
            if (typeof data === 'object' && !data.error && !data.detail) {
              errorMsg = Object.entries(data).map(([k, v]) => `${k}: ${v}`).join(', ');
            }
            showToast(errorMsg, "error");
          }
        } catch (err) {
          showToast("Network connection mapping error: " + err.message, "error");
        } finally {
          btn.disabled = false;
          btn.textContent = currentMode === "signup" ? "✨ Sign Up" : "🚀 Login";
        }
      });

      function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.left = Math.random() * 100 + '%';
          p.style.top = Math.random() * 100 + '%';
          const size = (Math.random() * 4 + 1) + 'px';
          p.style.width = p.style.height = size;
          p.style.animationDelay = (Math.random() * 6) + 's';
          p.style.animationDuration = (Math.random() * 3 + 3) + 's';
          container.appendChild(p);
        }
      }
      createParticles();
    </script>
</body>

</html>
